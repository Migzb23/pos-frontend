<!DOCTYPE html>
<html>
<head>
  <title>Smooth POS Prototype (Peso)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>POS System Prototype (₱)</h1>
  
  <div class="container">
    <!-- Item Input & Display -->
    <div class="section">
      <h2>Add Item</h2>
      <input type="text" id="itemName" placeholder="Item Name">
      <input type="number" id="itemPrice" placeholder="Price (₱)">
      <button onclick="addItem()">Add to Display</button>
      <button onclick="clearDisplay()">Clear Display Items</button>
      
      <h2>Items on Display</h2>
      <input type="text" id="searchDisplay" placeholder="Search Display Items..." onkeyup="filterDisplay()">

      <!-- ✅ Scrollable wrapper -->
      <div class="table-container">
        <table id="displayTable">
          <thead>
            <tr>
              <th onclick="sortTable('displayList',0)">Item Name <span class="sort-indicator"></span></th>
              <th onclick="sortTable('displayList',1,'number')">Price (₱) <span class="sort-indicator"></span></th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="displayList"></tbody>
        </table>
      </div>
    </div>
    
    <!-- Sold Items & Totals -->
    <div class="section">
      <h2>Sold Items</h2>
      <button onclick="clearSold()">Clear Sold Items</button>
      <input type="text" id="searchSold" placeholder="Search Sold Items..." onkeyup="filterSold()">

      <!-- ✅ Scrollable wrapper -->
      <div class="table-container">
        <table id="soldTable">
          <thead>
            <tr>
              <th onclick="sortTable('soldList',0)">Item Name <span class="sort-indicator"></span></th>
              <th onclick="sortTable('soldList',1,'number')">Price (₱) <span class="sort-indicator"></span></th>
              <th onclick="sortTable('soldList',2)">Date Sold <span class="sort-indicator"></span></th>
              <th>Remove</th>
            </tr>
          </thead>
          <tbody id="soldList"></tbody>
        </table>
      </div>

      <h3>Total Sales: ₱<span id="totalSales">0</span></h3>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
