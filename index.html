<!DOCTYPE html>
<html>
<head>
  <title>Smooth POS Prototype (Peso)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>POS System Prototype (₱)</h1>
  
  <div class="container">
    <!-- Item Input & Display -->
    <div class="section">
      <h2>Add Item</h2>
      <input type="text" id="itemName" placeholder="Item Name">
      <input type="number" id="itemPrice" placeholder="Price (₱)">
      <button onclick="addItem()">Add to Display</button>
      <button onclick="clearDisplay()">Clear Display Items</button>
      
      <h2>Items on Display</h2>
      <ul id="displayList"></ul>
    </div>
    
    <!-- Sold Items & Totals -->
    <div class="section">
      <h2>Sold Items</h2>
      <button onclick="clearSold()">Clear Sold Items</button>
      <ul id="soldList"></ul>
      <h3>Total Sales: ₱<span id="totalSales">0</span></h3>
    </div>
  </div>
  
  <!-- ✅ External JS file -->
  <script src="script.js"></script>
</body>
</html>
